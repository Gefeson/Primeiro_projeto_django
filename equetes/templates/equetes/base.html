<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
      {% block title %}
        Meu Projeto Enquetes
      {% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  </head>

  <body>
    <header>
      <nav class="navbar navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand" href="{% url 'equetes:index' %}">Enquetes</a>
        </div>
        {% if user.is_authenticated %}
          <span class="navbar-text me-3">Olá, {{ user.username }}!</span>
          <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" class="btn btn-light btn-sm">Entrar</a>
        {% endif %}
      </nav>
    </header>

    <main class="container mt-4">
      {% block content %}
 
      {% endblock %}
    </main>

    <footer class="container mt-4 text-center text-muted">
      <p>&copy; 2026 - Projeto Enquetes</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
